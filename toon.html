<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월루의 회전목마</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* 배경색 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .webtoon-container {
            width: 100%;
            max-width: 800px; /* 웹툰 최대 너비 */
        }
        .webtoon-container img {
            width: 100%;
            display: block; /* 이미지 사이의 미세한 공백 제거 */
        }
    </style>
</head>
<body>

    <div class="webtoon-container">
        <img src="images/01.jpg" alt="1화">
        <img src="images/02.jpg" alt="2화">
        <img src="images/03.jpg" alt="3화">
        </div>

</body>
</html>
